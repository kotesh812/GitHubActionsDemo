name: GitHub Actions Demo
run-name: "${{ github.actor }} is testing GitHub Actions \U0001F680"
'on':
  - push
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
